name: Deploy Workshop Documentation to GitHub Pages

on:
  push:
    branches:
      - dev
    paths:
      - 'docs/workshop/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ runner.os }}-${{ hashFiles('**/requirements.txt', '**/mkdocs.yml') }}
          path: .cache
          restore-keys: |
            mkdocs-material-${{ runner.os }}-
            
      - name: Install dependencies
        run: pip install mkdocs-material
        
      - name: Build documentation
        run: mkdocs build --config-file docs/workshop/mkdocs.yml --site-dir _site
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
