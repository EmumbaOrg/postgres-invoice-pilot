name: react-app
metadata:
  subscription: ${AZURE_SUBSCRIPTION_ID}
  location: ${AZURE_LOCATION}
workflows:
  up:
    steps:
      - azd: provision
      - azd: deploy

infra:
  bicep: ./infra/main.bicep

hooks:
  preprovision:
    shell: pwsh
    continueOnError: false
    interactive: true
    run: |
          Write-Host "Running capacity validation..." -ForegroundColor Yellow
          ./azd-hooks/preprovision-checklist.ps1
           if ($LASTEXITCODE -ne 0) {
           # Validation failed - script already showed error and cleaned up
           exit $LASTEXITCODE
            }
          Write-Host "Capacity validation completed successfully!" -ForegroundColor Green
          Write-Host "Running environment setup..." -ForegroundColor Yellow
          ./azd-hooks/preprovision.ps1
  postdeploy:
    shell: pwsh
    continueOnError: false
    interactive: true
    run: ./azd-hooks/postdeploy.ps1
    env:
      RUN_POSTDEPLOY_SCRIPT: ${RUN_POSTDEPLOY_SCRIPT}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID}
      AZURE_RESOURCE_GROUP: ${AZURE_RESOURCE_GROUP}
      SERVICE_API_IDENTITY_PRINCIPAL_NAME: ${SERVICE_API_IDENTITY_PRINCIPAL_NAME}
      POSTGRESQL_SERVER_NAME: ${POSTGRESQL_SERVER_NAME}
      POSTGRESQL_DATABASE_NAME: ${POSTGRESQL_DATABASE_NAME}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME}
      STORAGE_EVENTGRID_SYSTEM_TOPIC_NAME: ${STORAGE_EVENTGRID_SYSTEM_TOPIC_NAME}
      AZURE_AML_WORKSPACE_NAME: ${AZURE_AML_WORKSPACE_NAME}
      AZURE_AML_ENDPOINT_NAME: ${AZURE_AML_ENDPOINT_NAME}
      DEPLOY_AML_MODEL: ${DEPLOY_AML_MODEL}

services:
  UserPortal:
    project: ./src/userportal
    host: containerapp
    language: js
    docker:
      context: ./
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
      remoteBuild: true
      path: DOCKERFILE
    hooks:
      prebuild:
        shell: pwsh
        interactive: true
        continueOnError: false
        run: |
          Write-Host "[prebuild] Preparing .env.local for Vite" -ForegroundColor Cyan
          $apiUrl = azd env get-value SERVICE_API_ENDPOINT_URL
          if (-not $apiUrl -or $apiUrl.Trim() -eq '') {
            Write-Host "[prebuild] SERVICE_API_ENDPOINT_URL empty; using placeholder http://localhost:8000" -ForegroundColor Yellow
            $apiUrl = 'http://localhost:8000'
          }
            # Ensure trailing slash
          if ($apiUrl[-1] -ne '/') { $apiUrl = "$apiUrl/" }
          $line = "VITE_SERVICE_API_ENDPOINT_URL=$apiUrl"
          Set-Content -Path .\\.env.local -Value $line -NoNewline
          Write-Host "[prebuild] Wrote .env.local => $line" -ForegroundColor Green
    dependsOn:
      - infra

  API:
    project: ./src/api
    host: containerapp
    language: python
    docker:
      context: ./
      path: DOCKERFILE
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
      remoteBuild: true
    dependsOn:
      - infra
